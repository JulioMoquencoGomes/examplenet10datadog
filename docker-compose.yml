version: '3.8'

services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - DD_API_KEY=sua_api_key
      - DD_SERVICE=example-dotnet-datadog-app
      - DD_ENV=development
      - DD_VERSION=1.0.0
      - DD_LOGS_INJECTION=true
      - DD_TRACE_AGENT_URL=http://datadog-agent:8126
      - DD_DOGSTATSD_PORT=8125
    depends_on:
      - datadog-agent

  datadog-agent:
    image: gcr.io/datadoghq/agent:7
    environment:
      - DD_API_KEY=sua_api_key
      - DD_SITE=dd_site
      - DD_LOGS_ENABLED=true
      - DD_APM_ENABLED=true
      - DD_PROCESS_AGENT_ENABLED=true
    ports:
      - "8126:8126"
      - "8125:8125/udp"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc/:/host/proc/:ro
      - /sys/fs/cgroup/:/host/sys/fs/cgroup:ro